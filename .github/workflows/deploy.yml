name: Deploy to InfinityFree

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup .env
        run: cp .env.production .env

      - name: Generate APP_KEY
        run: php artisan key:generate --force

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload to InfinityFree via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ssl:verify-certificate no;
            mirror --reverse --verbose --delete \
              --exclude node_modules/ \
              --exclude .git/ \
              --exclude .github/ \
              --exclude .env.example \
              --exclude .env.backup \
              --exclude tests/ \
              --exclude .DS_Store \
              --exclude \*.log \
              --exclude database/ \
              ./ htdocs/;
            quit
          "

      - name: Run migrations on server
        run: |
          curl -sf https://${{ secrets.APP_DOMAIN }}/deploy || echo "Deploy route not available or already run"
